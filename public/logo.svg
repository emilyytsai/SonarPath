<svg xmlns="http://www.w3.org/2000/svg" width="200" height="50" viewBox="0 0 200 50" role="img">
  <title>SonarPath logo</title>
  <style>
    @keyframes sonarPulse {
      0% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
      100% { opacity: 0.15; transform: scale(1); }
    }
    @keyframes sonarPulse2 {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.06); }
      100% { opacity: 0.3; transform: scale(1); }
    }
    .ring1 { 
      animation: sonarPulse 2.5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .ring2 { 
      animation: sonarPulse2 2.5s ease-in-out infinite 0.4s;
      transform-box: fill-box;
      transform-origin: center;
    }
    .ring3 { 
      animation: sonarPulse2 2.5s ease-in-out infinite 0.8s;
      transform-box: fill-box;
      transform-origin: center;
    }
  </style>
  <g transform="translate(25, 25)">
    <circle class="ring1" cx="0" cy="0" r="18" fill="none" stroke="#00bfff" stroke-width="0.75"/>
    <circle class="ring2" cx="0" cy="0" r="12" fill="none" stroke="#00bfff" stroke-width="0.75"/>
    <circle class="ring3" cx="0" cy="0" r="6" fill="none" stroke="#00bfff" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#00bfff" opacity="0.9"/>
    <line x1="0" y1="0" x2="15" y2="-9" stroke="#00bfff" stroke-width="1" opacity="0.5"/>
    <text x="28" y="8" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="400" fill="#00bfff" letter-spacing="4">SONAR<tspan fill="#ffffff" font-weight="200" dx="2">PATH</tspan></text>
  </g>
</svg>
